<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifestyle & Success - Cognitive Journey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="root"></div>
    
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "lucide-react": "https://esm.sh/lucide-react@0.263.1"
            }
        }
    </script>

    <script type="module">
        import React, { useState } from 'react';
        import ReactDOM from 'react-dom/client';
        import { Brain, Activity, Calendar, CheckCircle, TrendingUp, Zap, Award, BookOpen, LogOut, Target, Sun, Coffee, Dumbbell, Google, Mail, Lock } from 'lucide-react';

        // Composant Login
        function LoginPage({ onLogin }) {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isSignUp, setIsSignUp] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (email && password) onLogin(email);
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-800 flex items-center justify-center p-4">
                    <div className="bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl p-8 w-full max-w-md border border-white/20">
                        <div className="text-center mb-8">
                            <div className="inline-flex items-center justify-center bg-gradient-to-r from-yellow-400 to-orange-500 rounded-full p-3 mb-4">
                                <Brain className="h-8 w-8 text-white" />
                            </div>
                            <h1 className="text-3xl font-bold text-white mb-2">LIFESTYLE & SUCCESS</h1>
                            <p className="text-white/80">🎓 Welcome Scholar</p>
                            <p className="text-white/60 text-sm mt-2">Sign in to track your cognitive journey</p>
                        </div>

                        <button onClick={() => onLogin('scholar@gmail.com')} className="w-full bg-white text-gray-800 rounded-lg py-3 px-4 flex items-center justify-center gap-3 hover:bg-gray-100 transition-colors mb-4">
                            <Google className="h-5 w-5" /> Continue with Google
                        </button>

                        <div className="relative mb-4"><div className="absolute inset-0 flex items-center"><div className="w-full border-t border-white/20"></div></div><div className="relative flex justify-center text-sm"><span className="px-2 bg-transparent text-white/60">Or with email</span></div></div>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div><label className="block text-white/80 text-sm mb-2">Email</label><div className="relative"><Mail className="absolute left-3 top-1/2 transform -translate-y-1/2 h-4 w-4 text-white/40" /><input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full bg-white/10 border border-white/20 rounded-lg py-2 pl-10 pr-3 text-white placeholder-white/40 focus:outline-none focus:border-yellow-400" placeholder="scholar@example.com" required /></div></div>
                            <div><label className="block text-white/80 text-sm mb-2">Password</label><div className="relative"><Lock className="absolute left-3 top-1/2 transform -translate-y-1/2 h-4 w-4 text-white/40" /><input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full bg-white/10 border border-white/20 rounded-lg py-2 pl-10 pr-3 text-white placeholder-white/40 focus:outline-none focus:border-yellow-400" placeholder="••••••••" required /></div></div>
                            <button type="submit" className="w-full bg-gradient-to-r from-yellow-400 to-orange-500 text-white font-semibold py-3 rounded-lg hover:opacity-90 transition-opacity">{isSignUp ? 'Sign Up' : 'Sign In'}</button>
                        </form>

                        <div className="text-center mt-4"><button onClick={() => setIsSignUp(!isSignUp)} className="text-white/60 text-sm hover:text-white/80 transition-colors">{isSignUp ? 'Already have an account? Sign In' : "Don't have an account? Sign Up"}</button></div>
                    </div>
                </div>
            );
        }

        // Composant Dashboard
        function Dashboard({ userEmail, onLogout }) {
            const [tasks, setTasks] = useState([
                { id: 1, text: "Méditation matinale", completed: true },
                { id: 2, text: "Lecture cognitive (20 min)", completed: true },
                { id: 3, text: "Exercice physique", completed: false },
                { id: 4, text: "Journal de gratitude", completed: false },
                { id: 5, text: "Brain training (app)", completed: true },
            ]);

            const toggleTask = (id) => setTasks(tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t));
            const completedCount = tasks.filter(t => t.completed).length;

            return (
                <div className="min-h-screen bg-gradient-to-br from-gray-50 to-indigo-50">
                    <nav className="bg-white shadow-md border-b border-gray-200">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div className="flex items-center space-x-3"><Brain className="h-8 w-8 text-indigo-600" /><span className="font-bold text-xl bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">Lifestyle & Success</span></div>
                            <div className="flex items-center space-x-4"><span className="text-sm text-gray-600">{userEmail}</span><button onClick={onLogout} className="flex items-center space-x-2 px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600"><LogOut className="h-4 w-4" /><span>Logout</span></button></div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        <div className="mb-8"><h1 className="text-3xl font-bold text-gray-800">🎓 Welcome back, Scholar!</h1><p className="text-gray-600">Track your cognitive journey</p></div>

                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                            <div className="bg-white rounded-xl shadow-sm p-6"><div className="flex justify-between"><div><p className="text-gray-500">Cognitive Score</p><p className="text-3xl font-bold text-indigo-600">78%</p></div><Brain className="h-10 w-10 text-indigo-400" /></div><div className="mt-4 bg-gray-200 rounded-full h-2"><div className="bg-indigo-600 rounded-full h-2 w-[78%]"></div></div></div>
                            <div className="bg-white rounded-xl shadow-sm p-6"><div className="flex justify-between"><div><p className="text-gray-500">Current Streak</p><p className="text-3xl font-bold text-orange-600">5 days</p></div><Zap className="h-10 w-10 text-orange-400" /></div></div>
                            <div className="bg-white rounded-xl shadow-sm p-6"><div className="flex justify-between"><div><p className="text-gray-500">Tasks Done</p><p className="text-3xl font-bold text-green-600">{completedCount}/{tasks.length}</p></div><CheckCircle className="h-10 w-10 text-green-400" /></div></div>
                            <div className="bg-white rounded-xl shadow-sm p-6"><div className="flex justify-between"><div><p className="text-gray-500">Daily Mood</p><p className="text-3xl font-bold text-purple-600">7/10</p></div><Sun className="h-10 w-10 text-purple-400" /></div></div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            <div className="bg-white rounded-xl shadow-sm p-6"><h2 className="text-xl font-semibold mb-4">Today's Tasks</h2>{tasks.map(task => (<div key={task.id} className="flex items-center space-x-3 p-2"><input type="checkbox" checked={task.completed} onChange={() => toggleTask(task.id)} className="w-5 h-5" /><span className={task.completed ? 'line-through text-gray-400' : 'text-gray-700'}>{task.text}</span></div>))}</div>
                            <div className="bg-gradient-to-r from-indigo-500 to-purple-600 rounded-xl shadow-sm p-6 text-white"><h3 className="text-lg font-semibold mb-2">💡 Cognitive Insight</h3><p>Your focus peaks between 9-11 AM. Schedule challenging tasks during this window.</p><div className="flex items-center gap-2 mt-3"><Award className="h-4 w-4" /><span>Based on your activity patterns</span></div></div>
                        </div>
                    </main>
                </div>
            );
        }

        // App principale
        function App() {
            const [loggedIn, setLoggedIn] = useState(false);
            const [userEmail, setUserEmail] = useState('');
            const handleLogin = (email) => { setUserEmail(email); setLoggedIn(true); };
            const handleLogout = () => { setLoggedIn(false); setUserEmail(''); };
            
            return !loggedIn ? <LoginPage onLogin={handleLogin} /> : <Dashboard userEmail={userEmail} onLogout={handleLogout} />;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
